# MGDemoPlus：MySQL + 后端（内置 dp_game 前端静态资源）
# 使用：在项目根目录执行  docker compose up --build
# 浏览器访问：http://localhost:8088  （路由为 hash，地址形如 /#/login）
#
# 数据库：首次启动自动在 school_db 中建表（./docker-data/mysql-init + src/main/resources/db）
# 图片上传目录：./docker-data/uploads 映射到容器内 /data/mgdemo-files

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      MYSQL_DATABASE: school_db
    # 本机若已装 MySQL 会占 3306，故映射到宿主机 3307；容器内仍是 3306，app 用 mysql:3306 不变
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker-data/mysql-init:/docker-entrypoint-initdb.d:ro
      # 与 00-school_db.sql 中 SOURCE 路径一致，避免重复拷贝建表 SQL
      - ./src/main/resources/db:/docker-schema:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build: .
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      MGDEMOPLUS_IMAGES_FILE_LOCATION: file:/data/mgdemo-files/
      MGDEMOPLUS_MUSIC_FILE_LOCATION: file:/data/mgdemo-files/music/
      # 可选：大模型 NPC（勿把密钥写进镜像，用环境变量覆盖）
      # ARK_API_KEY: ""
      # ARK_ENDPOINT_ID: ""
    volumes:
      - ./docker-data/uploads:/data/mgdemo-files
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
