# MGDemoPlus：MySQL + Redis + 后端（内置 dp_game 前端静态资源）
# 使用：在项目根目录执行  docker compose up --build
# 浏览器访问：
#   - 经 Nginx：https://localhost（无域名场景一般为自签证书，浏览器会提示证书不受信任）
#   - 直连应用：http://localhost:8088  （路由为 hash，地址形如 /#/login）
#
# 数据库：首次启动自动在 school_db 中建表（./docker-data/mysql-init + src/main/resources/db）
# 图片上传目录：./docker-data/uploads 映射到容器内 /data/mgdemo-files
# Redis：应用经内部网络连接 redis:6379；宿主机调试可用 localhost:6380（避免占满本机 6379）

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      MYSQL_DATABASE: school_db
    # 本机若已装 MySQL 会占 3306，故映射到宿主机 3307；容器内仍是 3306，app 用 mysql:3306 不变
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker-data/mysql-init:/docker-entrypoint-initdb.d:ro
      # 与 00-school_db.sql 中 SOURCE 路径一致，避免重复拷贝建表 SQL
      - ./src/main/resources/db:/docker-schema:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mgdemo_redis}
    ports:
      # 宿主机 6380 → 容器 6379，与本机独立安装的 Redis（常见 6379）错开
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mgdemo_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

  app:
    build: .
    # 仍映射 8088 便于本机直连调试；对外只走 Nginx 时可注释掉下面一行
    # ports:
    #   - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      MGDEMOPLUS_IMAGES_FILE_LOCATION: file:/data/mgdemo-files/
      MGDEMOPLUS_MUSIC_FILE_LOCATION: file:/data/mgdemo-files/music/
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-mgdemo_redis}
      # 可选：JWT / 大模型 NPC（由同目录 .env 注入，勿把真密钥写进仓库）
      JWT_SECRET: ${JWT_SECRET:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_ENDPOINT_ID: ${ARK_ENDPOINT_ID:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      ARK_REASONING_EFFORT: ${ARK_REASONING_EFFORT:-}
      ARK_THINKING_TYPE: ${ARK_THINKING_TYPE:-}
      MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS: ${MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS:-300}
    volumes:
      - ./docker-data/uploads:/data/mgdemo-files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
