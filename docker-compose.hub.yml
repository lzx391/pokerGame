# 仅镜像部署（不 clone 仓库）： Hub 拉 dpgame + dpgame-nginx；MySQL 用官方 mysql:8.0 空库，表结构由应用 Flyway。
#
# 使用：将此文件拷到服务器任意目录（同目录可放 .env），执行：
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up -d
#
# 浏览器：https://服务器IP/（自签证书会提示不信任）或 http://服务器IP:${NGINX_HTTP_PORT:-80}/
# 直连应用：http://服务器IP:${APP_HOST_PORT:-8088}/
# 本机 80 被占用时在 .env 写 NGINX_HTTP_PORT=8080。
#
# .env 常用（未写则用冒号后默认值）：
#   DOCKER_REGISTRY、IMAGE_TAG、MYSQL_ROOT_PASSWORD、REDIS_PASSWORD
#   NGINX_HTTP_PORT、NGINX_HTTPS_PORT、APP_HOST_PORT
#   JWT_SECRET、ARK_*、ARK_RESPONSE_JSON_OBJECT、MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS
#
# 证书：./docker/nginx/certs/fullchain.pem、privkey.pem（与 nginx 镜像内配置一致）。
# JDBC/Redis：写死主机名为 mysql/redis，勿用 .env 改 SPRING_DATASOURCE_URL（仅本机直连 Java 时有效）。

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      MYSQL_DATABASE: school_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mgdemo_redis}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mgdemo_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: ${DOCKER_REGISTRY:-1933886418}/dpgame-nginx:${IMAGE_TAG:-v1.0.1}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

  app:
    image: ${DOCKER_REGISTRY:-1933886418}/dpgame:${IMAGE_TAG:-v1.0.1}
    ports:
      - "${APP_HOST_PORT:-8088}:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      MGDEMOPLUS_IMAGES_FILE_LOCATION: file:/data/mgdemo-files/
      MGDEMOPLUS_MUSIC_FILE_LOCATION: file:/data/mgdemo-files/music/
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-mgdemo_redis}
      JWT_SECRET: ${JWT_SECRET:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_ENDPOINT_ID: ${ARK_ENDPOINT_ID:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      ARK_REASONING_EFFORT: ${ARK_REASONING_EFFORT:-}
      ARK_THINKING_TYPE: ${ARK_THINKING_TYPE:-}
      ARK_RESPONSE_JSON_OBJECT: ${ARK_RESPONSE_JSON_OBJECT:-true}
      MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS: ${MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS:-300}
    volumes:
      - mgdemo_uploads:/data/mgdemo-files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  mgdemo_uploads:
