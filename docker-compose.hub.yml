# 仅使用 Docker Hub（或其它仓库）上的镜像，无需 git clone 仓库、无需本机挂载 SQL/nginx 配置。
# 前置：已构建并推送 app、mysql、nginx 三个镜像（见 docs/DOCKER.md「仅镜像部署」）。
#
# 使用（在存放本文件的目录，或把本文件拷到服务器后）：
#   docker compose -f docker-compose.hub.yml up -d
#
# 浏览器：http://服务器IP/  或直连应用 http://服务器IP:8088/
# 本机 Windows 若 80 被占用（IIS 等），可在同目录 .env 写 NGINX_HTTP_PORT=8080，用 http://localhost:8080/ 访问 Nginx。
# 环境变量：DOCKER_REGISTRY（默认 1933886418）、IMAGE_TAG（默认 v1.0.0）、MYSQL_ROOT_PASSWORD、REDIS_PASSWORD、NGINX_HTTP_PORT（默认 80）

services:
  mysql:
    image: ${DOCKER_REGISTRY:-1933886418}/dpgame-mysql:${IMAGE_TAG:-v1.0.1}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      MYSQL_DATABASE: school_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mgdemo_redis}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mgdemo_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: ${DOCKER_REGISTRY:-1933886418}/dpgame-nginx:${IMAGE_TAG:-v1.0.1}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - app

  app:
    image: ${DOCKER_REGISTRY:-1933886418}/dpgame:${IMAGE_TAG:-v1.0.1}
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/school_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mgdemo_root}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      MGDEMOPLUS_IMAGES_FILE_LOCATION: file:/data/mgdemo-files/
      MGDEMOPLUS_MUSIC_FILE_LOCATION: file:/data/mgdemo-files/music/
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-mgdemo_redis}
      JWT_SECRET: ${JWT_SECRET:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_ENDPOINT_ID: ${ARK_ENDPOINT_ID:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      ARK_REASONING_EFFORT: ${ARK_REASONING_EFFORT:-}
      ARK_THINKING_TYPE: ${ARK_THINKING_TYPE:-}
    volumes:
      - mgdemo_uploads:/data/mgdemo-files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  mgdemo_uploads:
