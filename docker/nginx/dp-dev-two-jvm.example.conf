# 多 JVM 开发：同域转发 /dev-api、/b-api、/c-api、/dp-ws、/dp-ws-b、/dp-ws-c（第三套默认 8090，不用可删 upstream 与对应 location）。
# 挂载为：/etc/nginx/conf.d/default.conf
#
# 宿主机地址：Docker Desktop 用 host.docker.internal；Linux 的 docker run 请加：
#   --add-host=host.docker.internal:host-gateway

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream dp_jvm_a {
    server host.docker.internal:8088;
}

upstream dp_jvm_b {
    server host.docker.internal:8089;
}

upstream dp_jvm_c {
    server host.docker.internal:8090;
}

# 本机 vue-cli 开发服务器端口（与 npm run dev 终端里一致，常见 8080）
upstream vue_dev {
    server host.docker.internal:8080;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50m;

    # 页面走宿主机上的 Vue devServer，实现「浏览器只打 :80」与 /dev-api 同域
    location / {
        proxy_pass http://vue_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /dev-api/ {
        proxy_pass http://dp_jvm_a/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /b-api/ {
        proxy_pass http://dp_jvm_b/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /c-api/ {
        proxy_pass http://dp_jvm_c/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dp-ws/ {
        proxy_pass http://dp_jvm_a/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /dp-ws-b/ {
        proxy_pass http://dp_jvm_b/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /dp-ws-c/ {
        proxy_pass http://dp_jvm_c/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
