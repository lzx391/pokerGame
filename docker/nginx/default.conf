# MGDemoPlus：Nginx 反向代理到 Spring Boot（app:8088）
# 挂载为 /etc/nginx/conf.d/default.conf；与 docker-compose 中 nginx 服务配合使用。
#
# WebSocket：对局页使用 /ws/dp-game，须 Upgrade + Connection，并适当拉长读超时。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

# HTTPS 反向代理到 Spring Boot
server {
    listen 443 ssl http2;
    server_name _;

    # 自签/正式证书统一放在容器内 /etc/nginx/certs
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    # 游戏对局 WebSocket（经 HTTPS 访问时自动使用 wss://）
    location /ws/ {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # HTTP API + 静态资源（前端打包在 jar 内）
    location / {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
