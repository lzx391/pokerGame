# MGDemoPlus：Nginx 反向代理到 Spring Boot（app:8088）
# 挂载为 /etc/nginx/conf.d/default.conf；与 docker-compose 中 nginx 服务配合使用。
#
# WebSocket：对局页使用 /ws/dp-game，须 Upgrade + Connection，并适当拉长读超时。
# SSE：大厅 /dp/social/stream（EventSource），须 proxy_buffering off，与 dev 的 vue.config.js stream 代理一致。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name catandppoker.asia;

    return 301 https://$host$request_uri;
}

# HTTPS 反向代理到 Spring Boot
server {
    # Nginx 1.25+：勿再用 listen … http2，单独开 http2 on
    listen 443 ssl;
    http2 on;
    server_name catandppoker.asia;

    # 自签/正式证书统一放在容器内 /etc/nginx/certs
    ssl_certificate     /etc/nginx/certs/catandppoker.asia.pem;
    ssl_certificate_key /etc/nginx/certs/catandppoker.asia.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    # 压缩上游（Spring）返回的文本类响应；与静态资源长缓存配合降低跨境链路传输量
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # Vue CLI 带 contenthash 的 /js/*、/css/*：长缓存（发版后文件名变，无需短缓存 HTML 之外再清这些）
    # Nginx 会把未转义的 `{`/`}` 当成配置块分隔符；量词必须写成 \{ \}
    location ~* ^/(js|css)/[^/]+\.[0-9a-f]\{8,\}\.(js|css)(\?.*)?$ {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA 入口与显式 html：短缓存，避免新版发布后仍长期持有旧 shell 引用已删除的 chunk
    location = / {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache" always;
    }

    location = /index.html {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache" always;
    }

    # 大厅社交通知 SSE（EventSource；?token= 鉴权）
    location = /dp/social/stream {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        add_header Cache-Control "no-cache" always;
        add_header X-Accel-Buffering "no" always;
    }

    # 游戏对局 WebSocket（经 HTTPS 访问时自动使用 wss://）
    location /ws/ {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # HTTP API + 静态资源（前端打包在 jar 内）
    location / {
        proxy_pass http://app:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
