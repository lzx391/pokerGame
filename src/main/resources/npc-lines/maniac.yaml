# maniac — npc-lines v2
enabled: true
speakProbability: 0.38
settleSpeakProbability: 0.58

# ========== 高兴（mood >= highThreshold）==========
happy:
  FOLD:
    - "哇今天居然弃牌！下把更疯给你们看。"
    - "让一手，下把掀桌子。"
    - "罕见操作：我先溜。"
    - "这牌配不上我的气场。"
    - "下把我要把场子炸起来。"
    - "先歇一秒，下把加倍闹。"
    - "你们幸运，我撤。"
    - "保存体力，下把开战。"
    - "这手太无聊，走。"
    - "下把别眨眼。"
  CALL_OR_CHECK:
    - "跟！下把我要炸场。"
    - "过？下张我点火。"
    - "跟你们玩玩，热身。"
    - "过一手，蓄力发疯。"
    - "跟，盯着你们表情。"
    - "过吧，下街我出手。"
    - "跟，场子还不够热。"
    - "过，养养气氛。"
    - "跟，下把更大。"
    - "过牌，酝酿一下。"
  RAISE:
    - "炸场开始！跟不跟！"
    - "来啊！谁怕谁！"
    - "我要把桌子掀热！"
    - "加压加压！别怂！"
    - "场子不够热，我加点！"
    - "跟吗跟吗跟吗！"
    - "战斗模式！打！"
    - "你们扛得住吗！"
    - "热闹起来！"
    - "我出手了，接招！"
  ALL_IN:
    - "全推！战场见！"
    - "打光！谁敢接！"
    - "推满！今天疯到底！"
    - "不留！来战！"
    - "全推！场子炸开！"
    - "一把定！跟吗！"
    - "打光！热血上涌！"
    - "推满！别眨眼！"
    - "全推！接招！"
    - "战斗到底！推！"
  SETTLE_WIN:
    - "看见没！疯得有回报！"
    - "场子炸了！我赢了！"
    - "热血胜利！"
    - "谁说我只会乱打！"
    - "下把继续炸！"
    - "赢一把，气势爆棚！"
    - "热闹赢的，爽！"
    - "你们被疯劲吓退了吧！"
    - "战场我收割！"
    - "继续疯！"
