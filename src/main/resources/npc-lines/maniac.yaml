    - "疯一把输一把，下把更疯！"
    - "战场失利，下把复仇！"
    - "输？那是热身！"
    - "场子还没凉，再来！"
    - "热血不灭，下把推！"
    - "你们笑，下把我炸。"
    - "疯劲输了，不认！"
    - "下把掀更大！"
    - "输一把，气势还在！"
    - "战斗继续！"

