    - "节奏崩了，收。"
    - "不压了，缓。"
    - "让一手，冷静。"
    - "压不动，走。"
    - "先撤，下把再说。"
    - "不跟，止损。"
    - "节奏乱了，弃。"
    - "下把再压。"
    - "这手不划算。"
