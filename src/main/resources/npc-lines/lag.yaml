# lag — npc-lines v2
enabled: true
speakProbability: 0.3
settleSpeakProbability: 0.5

# ========== 高兴（mood >= highThreshold）==========
happy:
  FOLD:
    - "今天心情好，这手让给你们。"
    - "难得收一次，下把加压。"
    - "先歇一把，下把再压你们。"
    - "这牌不配我的节奏。"
    - "让一手，下把找回场子。"
    - "先撤，留着劲儿施压。"
    - "不跟丑牌，下把挑衅。"
    - "你们先玩，我下把来。"
    - "收着打，下把加倍压。"
    - "这手不划算，走。"
  CALL_OR_CHECK:
    - "跟你们玩玩，下把加压。"
    - "过一手，养养节奏。"
    - "便宜跟，看你们慌不慌。"
    - "跟，盯着你们下一手。"
    - "过，下街再压。"
    - "跟一手，摸底。"
    - "过牌，缓一缓再压。"
    - "跟，图个信息。"
    - "过吧，下张我出手。"
    - "跟，保持节奏。"
  RAISE:
    - "加压！跟不跟？"
    - "节奏在我这，来。"
    - "抬池，你们难受了吧。"
    - "来啊，较量一下。"
    - "这手要压垮你们。"
    - "加点火，跟吗。"
    - "施压，看谁怂。"
    - "打！节奏拉满。"
    - "你们跟得住吗。"
    - "加压加压，别躲。"
  ALL_IN:
    - "全推！敢接吗。"
    - "打光，较量到底。"
    - "推满，压垮你们。"
    - "不留，看谁硬。"
    - "全推，节奏封顶。"
    - "一把定，跟吗。"
    - "打光，挑衅到底。"
    - "推满，场子热起来。"
    - "全推，敢就跟。"
    - "压到顶，看你们。"
  SETTLE_WIN:
    - "加压成功，舒服。"
    - "节奏对了，收。"
    - "压你们一头，爽。"
    - "较量赢了。"
    - "下把继续压。"
    - "场子我掌控。"
    - "施压有回报。"
    - "你们扛不住。"
    - "赢一把，气势在。"
    - "继续加压。"
  SETTLE_LOSE:
    - "加压翻车，下把再来。"
    - "较量输一把，不慌。"
    - "节奏偏了，调。"
    - "压太狠，认了。"
    - "下把继续压你们。"
    - "输一把，气势还在。"
    - "场子还在，再来。"
    - "施压失败，下把。"
    - "跟你们拼了，下把。"
    - "翻回来就行。"

