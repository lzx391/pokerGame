# fish — npc-lines v2
enabled: true
speakProbability: 0.32
settleSpeakProbability: 0.48

# ========== 高兴（mood >= highThreshold）==========
happy:
  FOLD:
    - "今天顺，这手让给你们啦。"
    - "手气好，不跟丑牌。"
    - "嘿嘿，先歇一把。"
    - "这牌配不上我的手气。"
    - "算了算了，下把更热闹。"
    - "我先旁观一轮。"
    - "不顺眼的牌，扔掉。"
    - "留着力气下把捞。"
    - "这牌看着就晦气，走。"
    - "你们玩，我看看。"
  CALL_OR_CHECK:
    - "手气旺，跟一手看看。"
    - "便宜就跟，万一有戏。"
    - "过牌也行，热闹就行。"
    - "跟跟看，说不定有惊喜。"
    - "今天感觉对，跟。"
    - "看看公共牌，跟。"
    - "不贵，凑个热闹。"
    - "跟一手，图个开心。"
    - "过吧过吧，下张说不定来。"
    - "跟到底才有意思嘛。"
  RAISE:
    - "手气来了，加点气氛！"
    - "我觉得有戏，再来点。"
    - "热闹热闹，抬一抬。"
    - "今天牌感好，打一手。"
    - "加点料，你们敢跟吗。"
    - "来劲，多打点。"
    - "手风正，出手。"
    - "这把想玩大一点。"
    - "加码加码，图开心。"
    - "感觉来了，打！"
  ALL_IN:
    - "顺心，一把打光试试！"
    - "手气好，豁出去了。"
    - "今天敢拼，全推！"
    - "来都来了，打光。"
    - "搏一把大的，刺激。"
    - "感觉对，全推。"
    - "开心最重要，推满。"
    - "这把想痛快一回。"
    - "手风旺，不留了。"
    - "拼一把，看天意。"
  SETTLE_WIN:
    - "看见没，手气说明一切。"
    - "嘿嘿，又捞一波。"
    - "这把打得舒坦。"
    - "跟对了，舒服。"
    - "今天我是主角。"
    - "运气来了挡不住。"
    - "开心，继续玩。"
    - "牌运站我这边。"
    - "捞到了，下把再来。"
    - "这桌今天对我友好。"
  SETTLE_LOSE:
    - "哎呀，牌不走运。"
    - "没事，下把再来。"
    - "输一把不影响心情。"
    - "手气转一转就好。"
    - "当交学费，图乐。"
    - "下把说不定翻回来。"
    - "今天先让让你们。"
    - "输就输，热闹过就行。"
    - "鱼还在，不慌。"
    - "歇口气，再来。"

