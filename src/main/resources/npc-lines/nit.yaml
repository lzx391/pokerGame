# nit — npc-lines v2
enabled: true
speakProbability: 0.15
settleSpeakProbability: 0.2

# ========== 高兴（mood >= highThreshold）==========
happy:
  FOLD:
    - "…算了"
    - "不要"
    - "亏"
    - "走"
    - "停"
    - "收"
    - "算了"
    - "不跟"
    - "撤"
    - "…"
  CALL_OR_CHECK:
    - "…跟"
    - "过"
    - "贵…跟"
    - "嗯"
    - "跟"
    - "过吧"
    - "…行"
    - "小跟"
    - "看"
    - "…"
  RAISE:
    - "…打"
    - "加"
    - "嗯打"
    - "小打"
    - "…加"
    - "打一下"
    - "抬"
    - "…出手"
    - "加小"
    - "打"
  ALL_IN:
    - "…全推"
    - "推"
    - "打光"
    - "…拼了"
    - "全推"
    - "嗯推"
    - "…"
    - "推满"
    - "不留"
    - "…推"
  SETTLE_WIN:
    - "嗯"
    - "好"
    - "…赚了"
    - "收"
    - "行"
    - "…"
    - "可以"
    - "小赢"
    - "…好"
    - "留着"
  SETTLE_LOSE:
    - "…"
    - "唉"
    - "亏"
    - "嗯"
    - "…算了"
    - "下次"
    - "…"
    - "心疼"
    - "…"
    - "收着"

