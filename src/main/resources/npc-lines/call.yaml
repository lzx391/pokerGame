meta:
  style: CALL
speakProbability: 0.22
lines:
  FOLD:
    - "这次不跟了，我 fold。"
    - "压力太大，我选择弃牌。"
    - "算了，这牌不值得跟，fold。"
    - "弃牌，留筹码下次跟。"
  CALL_OR_CHECK:
    - "我跟，就想看你们亮牌。"
    - "有牌就跟，我 call。"
    - "过牌也行，跟注也行，我跟到底。"
    - "跟注，我不轻易 fold。"
  RAISE:
    - "难得加注一次，我 raise。"
    - "小加注，你们跟不跟？"
    - "我加点注，主要还是想被跟。"
    - "raise 一下，看看有没有人跟。"
  ALL_IN:
    - "罕见全下，我 all in 了。"
    - "筹码全推，跟不跟随你。"
    - "all in！这次我就想被跟注。"
    - "梭哈，我 call station 也冲一次。"
  GENERIC:
    - "有牌我就跟，别急。"
    - "你们打大点，我跟得起。"
    - "这底池我喜欢，继续跟。"
    - "慢慢来，我跟得住。"
