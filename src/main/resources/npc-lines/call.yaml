meta:
  style: CALL
speakProbability: 0.22
settleSpeakProbability: 0.44
lines:
  FOLD:
    - "这次不跟了，我 fold。"
    - "压力太大，我选择弃牌。"
    - "算了，这牌不值得跟，fold。"
    - "弃牌，留鱼干下次跟。"
  CALL_OR_CHECK:
    - "我跟，就想看你们亮牌。"
    - "有牌就跟，我 call。"
    - "观望也行，跟着也行，我跟到底。"
    - "跟住，我不轻易 fold。"
  RAISE:
    - "难得加一次，我 raise。"
    - "鱼干小加，你们跟不跟？"
    - "我加点鱼干，主要还是想被跟。"
    - "raise 一下，看看有没有人跟。"
  ALL_IN:
    - "罕见全下，我 all in 了。"
    - "鱼干全推，跟不跟随你。"
    - "all in！这次我就想被跟。"
    - "全下！我 call station 也冲一次。"
  SETTLE_WIN:
    - "跟到底就是香。"
    - "你们打，我收。"
    - "这池我喜欢，跟对了。"
  SETTLE_LOSE:
    - "跟太多了…下把还跟。"
    - "没事，有牌我还跟。"
    - "鱼干还在，继续看牌。"
