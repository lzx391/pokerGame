spring.application.name=MGDemoPlus
# JWT 签名密钥（UTF-8 至少 32 字节）；可由环境变量 JWT_SECRET 覆盖（.env 经 LocalDotenvLoader 写入系统属性）
mgdemoplus.jwt.secret=${JWT_SECRET:abcdefghhgfedcbaabcdefghhgfedcba}
mgdemoplus.jwt.expiration.time=86400000
# JWT 全局鉴权：不生成默认 user / 随机密码（见 SecurityConfig）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 本机默认值可写在下方；要覆盖请用环境变量 / 根目录 .env（变量名见 .env.example）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/school_db?useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper：牌谱列表分页（与 DpHandHistoryQueryMapper 中无 LIMIT 的列表 SQL 配合）
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
spring.datasource.druid.enable=true
spring.devtools.restart.additional-paths=src/main/java
server.port=8088

# ========== Redis（Lettuce，默认本机；有密码时取消注释 password）==========
# 环境变量覆盖：SPRING_DATA_REDIS_HOST、SPRING_DATA_REDIS_PORT、SPRING_DATA_REDIS_PASSWORD（见 .env.example）
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:ruoyi123}
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# 曲库列表 Redis 缓存 TTL（秒）；上传成功后会主动删缓存键。
mgdemoplus.cache.music-list-ttl-seconds=${MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS:300}

# DP 大厅表 dp_room_lobby 与内存 roomMap 对齐（清幽灵房）；单机房模型默认开启，多实例请设 false
mgdemoplus.dp-lobby-reconcile-enabled=true
# 对齐间隔（毫秒）；启动时也会立即跑一轮
mgdemoplus.dp-lobby-reconcile-ms=60000

# 头像等上传文件落盘目录（与 WebConfig `/images/**` 一致）；Docker 用环境变量 MGDEMOPLUS_IMAGES_FILE_LOCATION 覆盖
mgdemoplus.images.file-location=${MGDEMOPLUS_IMAGES_FILE_LOCATION:file:P:/javaworkspace/DPGameFiles/}
# 曲库音频（与 WebConfig `/music/**`、DpMusicController 一致）；可设 MGDEMOPLUS_MUSIC_FILE_LOCATION
mgdemoplus.music.file-location=${MGDEMOPLUS_MUSIC_FILE_LOCATION:file:P:/javaworkspace/DPGameFiles/music/}

spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=80MB

#logging.level.com.example.mgdemoplus.websocket=DEBUG

# ========== BOT_LLM（密钥勿提交 Git；优先读下列占位符对应的环境变量 / .env，见根目录 .env.example）==========

dp.llm.ark.api-key=${ARK_API_KEY:}
dp.llm.ark.endpoint-id=${ARK_ENDPOINT_ID:}
dp.llm.ark.base-url=${ARK_BASE_URL:}
# 推理/深度思考：reasoning_effort 调思维链长度；thinking.type 开关是否深度思考（Seed 系列默认多为 enabled，偏慢）
# 方舟不接受 low+disabled 等同传；代码在 thinking-type=disabled 时会忽略 reasoning-effort
dp.llm.ark.reasoning-effort=${ARK_REASONING_EFFORT:low}
dp.llm.ark.thinking-type=${ARK_THINKING_TYPE:enabled}