spring:
  application:
    name: MGDemoPlus
  flyway:
    locations: classpath:db/migration
    # 库已有业务表但从未跑过 Flyway（无 flyway_schema_history）时启用；首次会在当前库打 baseline 再执行更高版本脚本。
    baseline-on-migrate: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/school_db?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:mgdemo_root}
    druid:
      enable: true
  devtools:
    restart:
      additional-paths: src/main/java
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 80MB
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6380}
      password: ${SPRING_DATA_REDIS_PASSWORD:mgdemo_redis}
      database: 0
      timeout: 3000ms
  # SSE 长连接：避免默认 ~30s AsyncRequestTimeout 掐断 /dp/social/stream
  mvc:
    async:
      request-timeout: -1

mgdemoplus:
  # JVM 默认时区（北京时间 Asia/Shanghai；LocalDateTime.now、好友私信 created_at 等）；Docker 未设 TZ 时多为 UTC，会导致少 8 小时
  time-zone: ${MGDEMOPLUS_TIME_ZONE:Asia/Shanghai}
  jwt:
    secret: ${JWT_SECRET:abcdefghhgfedcbaabcdefghhgfedcba} # JWT 签名密钥（UTF-8 至少 32 字节）；可由环境变量 JWT_SECRET 覆盖（.env 经 LocalDotenvLoader 写入系统属性）
    expiration:
      time: 259200000
  cache:
    music-list-ttl-seconds: ${MGDEMOPLUS_CACHE_MUSIC_LIST_TTL_SECONDS:300} # 曲库列表 Redis 缓存 TTL（秒）；上传成功后会主动删缓存键。
  dp-lobby-reconcile-enabled: true # DP 大厅表 dp_room_lobby 与内存 roomMap 对齐（清幽灵房）；单机房模型默认开启，多实例请设 false
  dp-lobby-reconcile-ms: 60000 # 对齐间隔（毫秒）；启动时也会立即跑一轮
  dp-quick-match-prune-ms: 30000 # 默认快匹等待队列：清理超时/已在房内的条目（毫秒，fixedDelay）
  # 站点在线：last_seen_site 判定窗口。宜 &gt; 2～3×客户端 POST /dp/presence/site-heartbeat 间隔（默认 90s≈30s 间隔×3）。环境变量 MGDEMOPLUS_DP_SITE_PRESENCE_TTL_MS
  dp-site-presence-ttl-ms: ${MGDEMOPLUS_DP_SITE_PRESENCE_TTL_MS:90000}
  images:
    file-location: ${MGDEMOPLUS_IMAGES_FILE_LOCATION:file:P:/javaworkspace/DPGameFiles/} # 头像等上传文件落盘目录（与 WebConfig `/images/**` 一致）；Docker 用环境变量 MGDEMOPLUS_IMAGES_FILE_LOCATION 覆盖
  music:
    file-location: ${MGDEMOPLUS_MUSIC_FILE_LOCATION:file:P:/javaworkspace/DPGameFiles/music/} # 曲库音频（与 WebConfig `/music/**`、DpMusicController 一致）；可设 MGDEMOPLUS_MUSIC_FILE_LOCATION
  leaderboard:
    sync-interval-ms: 60000 # MySQL → Redis 全量同步间隔（毫秒，fixedDelay）
    sync-enabled: true
    redis-ttl-days: 14 # 周榜 ZSET 过期天数
  settle-persist:
    async-enabled: ${MGDEMOPLUS_SETTLE_PERSIST_ASYNC_ENABLED:true} # false：结算写回同步路径（回滚/单测）
    queue-capacity: ${MGDEMOPLUS_SETTLE_PERSIST_QUEUE_CAPACITY:256}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # StdOutImpl 会刷屏打印每条 SQL；需要看 SQL 时改为 Slf4jImpl 并设 logging.level 下对应 Mapper 包为 DEBUG
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

server:
  port: 8088

# 只盯大模型 SLF4J：root 安静，只放开下面两个 Logger。（MyBatis 已用 Slf4j；SQL 默认不刷。）
